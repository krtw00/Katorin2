services:
  postgres:
    image: postgres:18-alpine
    container_name: katorin2-ledger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ledger_development
    ports:
      - "5433:5432"
    volumes:
      - ledger_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ledger_development"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ledger_postgres_data:
