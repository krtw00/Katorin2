name: Supabase Migrate

on:
  push:
    branches: [main, staging]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ github.ref == 'refs/heads/staging' && vars.STAGING_SUPABASE_PROJECT_REF || vars.SUPABASE_PROJECT_REF || 'ueqqvjbcyiqftrowivvy' }}
      SUPABASE_DB_PASSWORD: ${{ github.ref == 'refs/heads/staging' && secrets.SUPABASE_STAGING_DB_PASSWORD || secrets.SUPABASE_DB_PASSWORD }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push database migrations
        run: supabase db push
