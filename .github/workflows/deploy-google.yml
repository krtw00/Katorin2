name: Deploy to Google

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: katorin2-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_ENV: production
      GOOGLE_CLOUD_PROJECT: ${{ vars.GOOGLE_CLOUD_PROJECT || 'oauthsetting-484201' }}
      GOOGLE_CLOUD_REGION: ${{ vars.GOOGLE_CLOUD_REGION || 'asia-northeast1' }}
      ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY || 'apps' }}

    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GOOGLE_CLOUD_PROJECT }}

      - name: Deploy Cloud Run service
        run: bash scripts/deploy-cloudrun-ledger.sh
        env:
          APP_ENV: ${{ env.APP_ENV }}

      - name: Run database migrations
        run: bash scripts/run-ledger-job.sh
        env:
          APP_ENV: ${{ env.APP_ENV }}
          TASK_NAME: migrate
          JOB_COMMAND: ./bin/rails db:migrate
