name: Deploy to Google

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: katorin2-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GOOGLE_CLOUD_PROJECT: ${{ vars.GOOGLE_CLOUD_PROJECT || 'oauthsetting-484201' }}
      GOOGLE_CLOUD_REGION: ${{ vars.GOOGLE_CLOUD_REGION || 'asia-northeast1' }}
      ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY || 'apps' }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'katorin2' }}
      RUNTIME_ENV_FILE: deploy/google/katorin2.runtime.env

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Write runtime env
        run: |
          cat <<'EOF' > "$RUNTIME_ENV_FILE"
          ${{ secrets.KATORIN2_RUNTIME_ENV }}
          EOF

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GOOGLE_CLOUD_PROJECT }}

      - name: Deploy Cloud Run service
        run: npm run deploy:cloudrun

      - name: Deploy Firebase Hosting proxy
        run: npm run deploy:firebase
