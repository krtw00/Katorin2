<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <style>
    .bg { fill: #ffffff; }
    .k { fill: #0d9488; }
    .gem { fill: none; stroke: #5eead4; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0c1929; }
      .k { fill: #5eead4; }
      .gem { stroke: #2dd4bf; }
    }
  </style>

  <rect class="bg" width="512" height="512" rx="102"/>

  <!-- Subtle gem facet hint in background -->
  <path class="gem" d="M256 42 L420 176 L420 336 L256 470 L92 336 L92 176 Z" stroke-width="2" opacity="0.15"/>

  <!-- K: teal, single color, gem-like clean edges -->
  <rect class="k" x="132" y="92" width="68" height="328" rx="4"/>
  <path class="k" d="M200 258 L200 220 L366 92 L366 150 Z"/>
  <path class="k" d="M200 258 L200 296 L366 420 L366 362 Z"/>
</svg>
