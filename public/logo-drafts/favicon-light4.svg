<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <style>
    .bg { fill: #f5f3ff; }
    .k-body { fill: #312e81; }
    .k-leg { fill: #4f46e5; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1e1b4b; }
      .k-body { fill: #e0e7ff; }
      .k-leg { fill: #818cf8; }
    }
  </style>

  <!-- Soft purple tinted background -->
  <rect class="bg" width="512" height="512" rx="102"/>

  <!-- K: indigo body + brighter indigo lower leg -->
  <rect class="k-body" x="132" y="92" width="68" height="328" rx="8"/>
  <path class="k-body" d="M200 258 L200 218 L364 92 L364 156 Z"/>
  <path class="k-leg" d="M200 258 L200 298 L364 420 L364 356 Z"/>
</svg>
