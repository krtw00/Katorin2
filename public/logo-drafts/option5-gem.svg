<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0c1929"/>

  <!-- Water ripple rings -->
  <ellipse cx="256" cy="380" rx="140" ry="24" stroke="#1e40af" stroke-width="2" opacity="0.3"/>
  <ellipse cx="256" cy="380" rx="100" ry="16" stroke="#2563eb" stroke-width="2" opacity="0.2"/>

  <!-- Gem / Crystal shape -->
  <path d="M256 80 L360 200 L320 400 L192 400 L152 200 Z" fill="url(#gem1)" stroke="#60a5fa" stroke-width="3"/>

  <!-- Gem facet lines -->
  <path d="M256 80 L192 400" stroke="#93c5fd" stroke-width="1.5" opacity="0.4"/>
  <path d="M256 80 L320 400" stroke="#93c5fd" stroke-width="1.5" opacity="0.4"/>
  <path d="M152 200 L360 200" stroke="#93c5fd" stroke-width="1.5" opacity="0.5"/>
  <path d="M256 80 L256 200" stroke="#bfdbfe" stroke-width="1.5" opacity="0.3"/>
  <path d="M192 400 L256 200 L320 400" stroke="#93c5fd" stroke-width="1.5" opacity="0.3"/>

  <!-- Inner highlight -->
  <path d="M256 100 L200 200 L256 200 Z" fill="#60a5fa" opacity="0.3"/>
  <path d="M256 100 L312 200 L256 200 Z" fill="#93c5fd" opacity="0.2"/>

  <!-- Sparkle -->
  <path d="M340 120 L344 130 L354 130 L346 136 L350 146 L340 140 L330 146 L334 136 L326 130 L336 130 Z" fill="#f8fafc" opacity="0.8"/>
  <circle cx="160" cy="160" r="3" fill="#f8fafc" opacity="0.6"/>
  <circle cx="380" cy="260" r="2" fill="#f8fafc" opacity="0.4"/>

  <defs>
    <linearGradient id="gem1" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="40%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
  </defs>
</svg>
