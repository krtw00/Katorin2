<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background rounded square -->
  <rect x="24" y="24" width="464" height="464" rx="80" fill="#0f172a"/>
  <rect x="36" y="36" width="440" height="440" rx="72" fill="url(#bg3)" stroke="#1e40af" stroke-width="2"/>

  <!-- Tournament bracket lines (left side) -->
  <path d="M100 150 H140 V200 H160" stroke="#334155" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M100 250 H140 V200 H160" stroke="#334155" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M100 310 H140 V360 H160" stroke="#334155" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M100 410 H140 V360 H160" stroke="#334155" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bracket to center -->
  <path d="M160 200 H200 V280 H220" stroke="#475569" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M160 360 H200 V280 H220" stroke="#475569" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center trophy/winner -->
  <circle cx="256" cy="280" r="36" fill="none" stroke="#3b82f6" stroke-width="6"/>
  <circle cx="256" cy="280" r="20" fill="#3b82f6"/>

  <!-- Crown on top -->
  <path d="M230 230 L243 210 L256 225 L269 210 L282 230"
        stroke="#f59e0b" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- K letter overlaid -->
  <path d="M248 262 L248 298" stroke="#f8fafc" stroke-width="6" stroke-linecap="round"/>
  <path d="M250 280 L268 264" stroke="#f8fafc" stroke-width="5" stroke-linecap="round"/>
  <path d="M254 280 L270 298" stroke="#f8fafc" stroke-width="5" stroke-linecap="round"/>

  <!-- Right bracket (mirror) -->
  <path d="M290 280 H340" stroke="#475569" stroke-width="6" stroke-linecap="round"/>
  <path d="M340 200 H380 V280 H340" stroke="#334155" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M340 360 H380 V280" stroke="#334155" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Dots for teams -->
  <circle cx="100" cy="150" r="8" fill="#64748b"/>
  <circle cx="100" cy="250" r="8" fill="#64748b"/>
  <circle cx="100" cy="310" r="8" fill="#64748b"/>
  <circle cx="100" cy="410" r="8" fill="#64748b"/>
  <circle cx="412" cy="200" r="8" fill="#64748b"/>
  <circle cx="412" cy="360" r="8" fill="#64748b"/>

  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
</svg>
