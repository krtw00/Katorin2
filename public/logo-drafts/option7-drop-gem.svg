<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="#0a1628"/>

  <!-- Water drop + gem hybrid shape -->
  <path d="M256 56 Q384 200 384 300 Q384 396 256 456 Q128 396 128 300 Q128 200 256 56 Z"
        fill="url(#dropgem)" stroke="#38bdf8" stroke-width="3"/>

  <!-- Gem facet: top -->
  <path d="M256 56 L340 220 L256 240 Z" fill="#7dd3fc" opacity="0.2"/>
  <path d="M256 56 L172 220 L256 240 Z" fill="#38bdf8" opacity="0.15"/>

  <!-- Gem facet: middle -->
  <path d="M172 220 L340 220 L256 240 Z" fill="#0ea5e9" opacity="0.1"/>

  <!-- Gem facet: bottom -->
  <path d="M172 220 L256 240 L160 340 Z" fill="#0369a1" opacity="0.15"/>
  <path d="M340 220 L256 240 L352 340 Z" fill="#075985" opacity="0.12"/>

  <!-- Facet lines -->
  <path d="M256 240 L256 400" stroke="#38bdf8" stroke-width="1.5" opacity="0.25"/>
  <path d="M172 220 L340 220" stroke="#7dd3fc" stroke-width="1.5" opacity="0.3"/>
  <path d="M160 340 L352 340" stroke="#0ea5e9" stroke-width="1" opacity="0.2"/>
  <path d="M256 240 L160 340" stroke="#38bdf8" stroke-width="1" opacity="0.15"/>
  <path d="M256 240 L352 340" stroke="#38bdf8" stroke-width="1" opacity="0.15"/>

  <!-- Bottom curve glow -->
  <path d="M180 380 Q256 430 332 380" stroke="#0ea5e9" stroke-width="2" opacity="0.3" fill="none"/>

  <!-- Highlight sparkle at top -->
  <path d="M280 100 L284 112 L296 112 L286 120 L290 132 L280 124 L270 132 L274 120 L264 112 L276 112 Z"
        fill="#f0f9ff" opacity="0.9"/>

  <!-- Small sparkles -->
  <circle cx="200" cy="160" r="3" fill="#f0f9ff" opacity="0.5"/>
  <circle cx="340" cy="300" r="2" fill="#bae6fd" opacity="0.4"/>
  <circle cx="180" cy="320" r="2.5" fill="#e0f2fe" opacity="0.3"/>

  <defs>
    <linearGradient id="dropgem" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc"/>
      <stop offset="25%" style="stop-color:#38bdf8"/>
      <stop offset="50%" style="stop-color:#0ea5e9"/>
      <stop offset="75%" style="stop-color:#0369a1"/>
      <stop offset="100%" style="stop-color:#0c4a6e"/>
    </linearGradient>
  </defs>
</svg>
