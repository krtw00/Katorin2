<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Container: deeper purple -->
  <rect width="512" height="512" rx="102" fill="#0f0a2e"/>
  <rect x="8" y="8" width="496" height="496" rx="96" fill="#1a1145" stroke="#3b2d7a" stroke-width="3"/>

  <!-- K - bold strokes with rounded caps -->
  <!-- Vertical -->
  <line x1="176" y1="108" x2="176" y2="404" stroke="#e9e5ff" stroke-width="56" stroke-linecap="round"/>

  <!-- Upper diagonal -->
  <line x1="200" y1="260" x2="348" y2="108" stroke="#e9e5ff" stroke-width="48" stroke-linecap="round"/>

  <!-- Lower diagonal - bright violet accent -->
  <line x1="216" y1="264" x2="356" y2="404" stroke="#7c3aed" stroke-width="48" stroke-linecap="round"/>
</svg>
