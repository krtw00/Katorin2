<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <style>
    .bg { fill: #faf5ff; }
    .border { stroke: #e9d5ff; fill: none; }
    .k-main { fill: #3b0764; }
    .k-accent { fill: #7c3aed; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1e1b4b; }
      .border { stroke: #3b2d7a; }
      .k-main { fill: #f5f3ff; }
      .k-accent { fill: #a78bfa; }
    }
  </style>

  <rect class="bg" width="512" height="512" rx="102"/>
  <rect class="border" x="12" y="12" width="488" height="488" rx="94" stroke-width="3"/>

  <!-- K: rounded strokes -->
  <line class="k-main" x1="176" y1="108" x2="176" y2="404" stroke-width="56" stroke-linecap="round" stroke="#3b0764"/>
  <line class="k-main" x1="200" y1="260" x2="348" y2="108" stroke-width="48" stroke-linecap="round" stroke="#3b0764"/>
  <line class="k-accent" x1="216" y1="264" x2="356" y2="404" stroke-width="48" stroke-linecap="round" stroke="#7c3aed"/>
</svg>
