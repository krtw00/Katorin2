<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <style>
    .bg { fill: #fafaf9; }
    .stone-dark { fill: #44403c; }
    .stone-mid { fill: #78716c; }
    .stone-light { fill: #a8a29e; }
    .crack { stroke: #d6d3d1; fill: none; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1c1917; }
      .stone-dark { fill: #e7e5e4; }
      .stone-mid { fill: #a8a29e; }
      .stone-light { fill: #78716c; }
      .crack { stroke: #57534e; }
    }
  </style>

  <rect class="bg" width="512" height="512" rx="102"/>

  <!-- K carved from stone: jagged edges, faceted look -->
  <!-- Vertical: solid stone pillar -->
  <polygon class="stone-dark" points="124,88 200,88 204,96 204,408 200,420 124,420 120,412 120,96"/>
  <!-- Chisel mark on pillar -->
  <line class="crack" x1="140" y1="88" x2="160" y2="420" stroke-width="1.5" opacity="0.3"/>

  <!-- Upper diagonal: rough hewn -->
  <polygon class="stone-dark" points="204,250 204,200 360,80 372,92 372,148 210,258"/>

  <!-- Lower diagonal: slightly different stone tone -->
  <polygon class="stone-mid" points="210,262 204,268 204,310 360,428 372,416 372,360"/>

  <!-- Crack/fracture lines across K for rock texture -->
  <line class="crack" x1="240" y1="200" x2="300" y2="130" stroke-width="2" opacity="0.4"/>
  <line class="crack" x1="260" y1="320" x2="330" y2="390" stroke-width="2" opacity="0.3"/>
  <line class="crack" x1="150" y1="240" x2="190" y2="280" stroke-width="1.5" opacity="0.25"/>
</svg>
