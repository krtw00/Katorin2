<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <style>
    .bg { fill: #ffffff; }
    .k-main { fill: #1e1b4b; }
    .k-accent { fill: #7c3aed; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1e1b4b; }
      .k-main { fill: #f5f3ff; }
      .k-accent { fill: #a78bfa; }
    }
  </style>

  <rect class="bg" width="512" height="512" rx="102"/>

  <!-- K: vertical -->
  <rect class="k-main" x="120" y="88" width="72" height="336" rx="6"/>
  <!-- K: upper diagonal -->
  <path class="k-main" d="M192 256 L192 216 L368 88 L368 148 Z"/>
  <!-- K: lower diagonal - accent -->
  <path class="k-accent" d="M192 256 L192 296 L368 424 L368 364 Z"/>
</svg>
