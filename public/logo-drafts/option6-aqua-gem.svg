<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background circle with water gradient -->
  <circle cx="256" cy="256" r="248" fill="url(#water)"/>
  <circle cx="256" cy="256" r="232" fill="#0c1929" stroke="#1e40af" stroke-width="2"/>

  <!-- Hexagonal gem (aquamarine cut) -->
  <path d="M256 72 L380 164 L380 348 L256 440 L132 348 L132 164 Z"
        fill="url(#aqua)" stroke="#38bdf8" stroke-width="4"/>

  <!-- Top facets -->
  <path d="M256 72 L380 164 L256 220 Z" fill="#7dd3fc" opacity="0.25"/>
  <path d="M256 72 L132 164 L256 220 Z" fill="#38bdf8" opacity="0.15"/>

  <!-- Side facets -->
  <path d="M380 164 L380 348 L256 220 Z" fill="#0ea5e9" opacity="0.1"/>
  <path d="M132 164 L132 348 L256 220 Z" fill="#0284c7" opacity="0.15"/>

  <!-- Bottom facets -->
  <path d="M256 440 L380 348 L256 300 Z" fill="#075985" opacity="0.2"/>
  <path d="M256 440 L132 348 L256 300 Z" fill="#0c4a6e" opacity="0.25"/>

  <!-- Central line -->
  <path d="M256 220 L256 300" stroke="#7dd3fc" stroke-width="2" opacity="0.4"/>
  <path d="M256 220 L380 348" stroke="#38bdf8" stroke-width="1" opacity="0.2"/>
  <path d="M256 220 L132 348" stroke="#38bdf8" stroke-width="1" opacity="0.2"/>
  <path d="M256 300 L380 348" stroke="#38bdf8" stroke-width="1" opacity="0.15"/>
  <path d="M256 300 L132 348" stroke="#38bdf8" stroke-width="1" opacity="0.15"/>

  <!-- Inner glow -->
  <circle cx="256" cy="240" r="40" fill="#38bdf8" opacity="0.08"/>
  <circle cx="256" cy="240" r="20" fill="#7dd3fc" opacity="0.1"/>

  <!-- Sparkles -->
  <circle cx="300" cy="130" r="4" fill="#f0f9ff" opacity="0.9"/>
  <circle cx="300" cy="130" r="8" fill="#f0f9ff" opacity="0.2"/>
  <circle cx="180" cy="190" r="2.5" fill="#f0f9ff" opacity="0.6"/>
  <circle cx="350" cy="280" r="2" fill="#f0f9ff" opacity="0.4"/>

  <defs>
    <linearGradient id="water" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#0c4a6e"/>
    </linearGradient>
    <linearGradient id="aqua" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="30%" style="stop-color:#0ea5e9"/>
      <stop offset="70%" style="stop-color:#0369a1"/>
      <stop offset="100%" style="stop-color:#0c4a6e"/>
    </linearGradient>
  </defs>
</svg>
